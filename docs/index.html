<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Movies & Books Tracker</title>
<meta name="description" content="Track Disney & Pixar films and Stephen King books — what you've watched and read." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>" />
</head>
<body data-tab="movies">
  <div class="aurora" aria-hidden="true"></div>
  <div class="spotlight" aria-hidden="true"></div>
  <div class="page-turn" id="page-turn" aria-hidden="true"></div>
  <div class="intro" id="intro" aria-hidden="true">
    <div class="clap">
      <div class="clap-top"></div>
      <div class="clap-body">🎬<span class="clap-amp">&amp;</span>📚</div>
    </div>
  </div>

  <header class="site-header">
    <div class="wrap">
      <h1 class="logo"><span class="logo-emoji">🎬</span> Movies &amp; Books <span class="logo-emoji">📚</span></h1>
      <p class="tagline">Every Disney &amp; Pixar film and Stephen King book — tracked.</p>

      <nav class="tabs" role="tablist">
        <button class="tab" data-target="movies" role="tab" aria-selected="true">🎬 Films</button>
        <button class="tab" data-target="books" role="tab" aria-selected="false">📚 Books</button>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <!-- Progress -->
    <section class="progress-card" aria-live="polite">
      <div class="progress-head">
        <div>
          <h2 id="progress-title">Films watched</h2>
          <p id="progress-sub" class="progress-sub">—</p>
        </div>
        <div class="ring-wrap">
          <svg class="ring" viewBox="0 0 120 120" aria-hidden="true">
            <circle class="ring-bg" cx="60" cy="60" r="52" />
            <circle class="ring-fg" id="ring-fg" cx="60" cy="60" r="52" />
          </svg>
          <div class="progress-pct" id="progress-pct">0%</div>
        </div>
      </div>
      <div class="bar"><div class="bar-fill" id="bar-fill" style="width:0%"></div></div>
      <div class="group-stats" id="group-stats"></div>
    </section>

    <!-- Toolbar -->
    <section class="toolbar">
      <input type="search" id="search" placeholder="Search titles…" autocomplete="off" />
      <div class="seg" id="filter" role="group" aria-label="Filter">
        <button data-filter="all" class="active">All</button>
        <button data-filter="done">Done</button>
        <button data-filter="todo">To-do</button>
      </div>
      <select id="sort" aria-label="Sort">
        <option value="year-asc">Year ↑</option>
        <option value="year-desc">Year ↓</option>
        <option value="title-asc">Title A–Z</option>
        <option value="recent">Recently finished</option>
      </select>
    </section>

    <!-- Grid -->
    <section class="grid" id="grid"></section>
    <p class="empty" id="empty" hidden>Nothing matches your filters.</p>
  </main>

  <footer class="site-footer">
    <div class="wrap footer-inner">
      <span id="footer-count">—</span>
      <div class="footer-actions">
        <button id="export" class="ghost">⬇︎ Export progress</button>
        <label for="import-file" class="ghost" role="button" tabindex="0">⬆︎ Import</label>
        <input type="file" id="import-file" accept="application/json" hidden />
      </div>
      <span class="footer-note">Your progress is saved in this browser. Export to back up or move devices.</span>
    </div>
  </footer>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
