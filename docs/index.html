<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rastreador de Filmes &amp; Livros</title>
<meta name="description" content="Acompanhe os filmes da Disney &amp; Pixar e os livros de Stephen King — o que você já assistiu e leu." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>" />
</head>
<body data-tab="movies">
  <div class="aurora" aria-hidden="true"></div>
  <div class="scene" aria-hidden="true">
    <div class="scene-layer scene-movies">
      <span style="--x:6%;--s:42px;--d:0s;--dur:21s;--r:200deg">🎬</span>
      <span style="--x:18%;--s:26px;--d:-7s;--dur:17s;--r:-160deg">🍿</span>
      <span style="--x:31%;--s:34px;--d:-3s;--dur:24s;--r:240deg">🎞️</span>
      <span style="--x:44%;--s:22px;--d:-12s;--dur:15s;--r:300deg">⭐</span>
      <span style="--x:57%;--s:38px;--d:-9s;--dur:23s;--r:-200deg">📽️</span>
      <span style="--x:69%;--s:24px;--d:-5s;--dur:18s;--r:180deg">✨</span>
      <span style="--x:80%;--s:30px;--d:-15s;--dur:20s;--r:-260deg">🎟️</span>
      <span style="--x:91%;--s:36px;--d:-2s;--dur:26s;--r:220deg">🌟</span>
    </div>
    <div class="scene-layer scene-books">
      <span style="--x:7%;--s:38px;--d:0s;--dur:23s;--r:180deg">📖</span>
      <span style="--x:20%;--s:26px;--d:-8s;--dur:18s;--r:-200deg">🕯️</span>
      <span style="--x:33%;--s:34px;--d:-4s;--dur:25s;--r:220deg">📚</span>
      <span style="--x:46%;--s:22px;--d:-13s;--dur:16s;--r:300deg">🗝️</span>
      <span style="--x:58%;--s:30px;--d:-10s;--dur:22s;--r:-180deg">📜</span>
      <span style="--x:70%;--s:24px;--d:-6s;--dur:19s;--r:240deg">🪶</span>
      <span style="--x:82%;--s:28px;--d:-16s;--dur:21s;--r:-260deg">🌙</span>
      <span style="--x:92%;--s:34px;--d:-3s;--dur:27s;--r:200deg">✨</span>
    </div>
  </div>
  <div class="spotlight" aria-hidden="true"></div>
  <div class="page-turn" id="page-turn" aria-hidden="true"></div>
  <div class="intro" id="intro" aria-hidden="true">
    <div class="clap">
      <div class="clap-top"></div>
      <div class="clap-body">🎬<span class="clap-amp">&amp;</span>📚</div>
    </div>
  </div>

  <header class="site-header">
    <div class="wrap">
      <h1 class="logo"><span class="logo-emoji">🎬</span> Filmes &amp; Livros <span class="logo-emoji">📚</span></h1>
      <p class="tagline">Todos os filmes da Disney &amp; Pixar e os livros de Stephen King — acompanhados.</p>

      <nav class="tabs" role="tablist">
        <button class="tab" data-target="movies" role="tab" aria-selected="true">🎬 Filmes</button>
        <button class="tab" data-target="books" role="tab" aria-selected="false">📚 Livros</button>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section class="progress-card" aria-live="polite">
      <div class="progress-head">
        <div>
          <h2 id="progress-title">Filmes assistidos</h2>
          <p id="progress-sub" class="progress-sub">—</p>
        </div>
        <div class="ring-wrap">
          <svg class="ring" viewBox="0 0 120 120" aria-hidden="true">
            <circle class="ring-bg" cx="60" cy="60" r="52" />
            <circle class="ring-fg" id="ring-fg" cx="60" cy="60" r="52" />
          </svg>
          <div class="progress-pct" id="progress-pct">0%</div>
        </div>
      </div>
      <div class="bar"><div class="bar-fill" id="bar-fill" style="width:0%"></div></div>
      <div class="group-stats" id="group-stats"></div>
    </section>

    <section class="toolbar">
      <input type="search" id="search" placeholder="Buscar títulos…" autocomplete="off" />
      <div class="seg" id="filter" role="group" aria-label="Filtrar">
        <button data-filter="all" class="active">Todos</button>
        <button data-filter="done">Concluídos</button>
        <button data-filter="todo">Pendentes</button>
      </div>
      <select id="sort" aria-label="Ordenar">
        <option value="year-asc">Ano ↑</option>
        <option value="year-desc">Ano ↓</option>
        <option value="title-asc">Título A–Z</option>
        <option value="recent">Concluídos recentemente</option>
      </select>
    </section>

    <section class="grid" id="grid"></section>
    <p class="empty" id="empty" hidden>Nada corresponde aos seus filtros.</p>
  </main>

  <footer class="site-footer">
    <div class="wrap footer-inner">
      <span id="footer-count">—</span>
      <div class="footer-actions">
        <button id="export" class="ghost">⬇︎ Exportar progresso</button>
        <label for="import-file" class="ghost" role="button" tabindex="0">⬆︎ Importar</label>
        <input type="file" id="import-file" accept="application/json" hidden />
      </div>
      <span class="footer-note">Seu progresso é salvo neste navegador. Exporte para fazer backup ou trocar de dispositivo.</span>
    </div>
  </footer>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
